{% extends 'accounting/base.html' %}

{% block page_title %}New Journal Entry{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <form method="POST">
        {% csrf_token %}
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem;">
            <div class="form-group">
                <label for="date">Transaction Date</label>
                <input type="date" name="date" id="date" class="form-control" required value="{{ today|date:'Y-m-d' }}">
            </div>
            <div class="form-group">
                <label for="contact">Contact (Vendor/Customer)</label>
                <select name="contact" id="contact" class="form-control">
                    <option value="">None</option>
                    {% for c in contacts %}
                    <option value="{{ c.id }}">{{ c.name }} ({{ c.contact_type }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="description">Description</label>
                <input type="text" name="description" id="description" class="form-control"
                    placeholder="e.g. Monthly Rent" required>
            </div>
        </div>

        <h4 style="margin-bottom: 1rem; color: var(--text-light); font-size: 0.875rem; text-transform: uppercase;">Entry
            Details</h4>

        <div style="background: #f8fafc; padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem;">
            <div
                style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; align-items: end; margin-bottom: 1rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Debit Account</label>
                    <select name="debit_account" class="form-control" required>
                        <option value="">Select Account</option>
                        {% for account in accounts %}
                        <option value="{{ account.id }}">{{ account.code }} - {{ account.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Amount ($)</label>
                    <input type="number" step="0.01" name="debit_amount" class="form-control" placeholder="0.00"
                        required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; align-items: end;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Credit Account</label>
                    <select name="credit_account" class="form-control" required>
                        <option value="">Select Account</option>
                        {% for account in accounts %}
                        <option value="{{ account.id }}">{{ account.code }} - {{ account.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>Amount ($)</label>
                    <input type="number" step="0.01" name="credit_amount" class="form-control" placeholder="0.00"
                        required>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
            <button type="button" class="btn" style="background: transparent; color: var(--text-light);"
                onclick="history.back()">Cancel</button>
            <button type="submit" class="btn btn-primary" style="padding: 12px 30px;">
                <i class="fas fa-save"></i> Post Entry
            </button>
        </div>
    </form>
</div>

<script>
    // Set today's date if not provided
    document.getElementById('date').valueAsDate = new Date();

    // Basic validation to ensure debits = credits
    document.querySelector('form').onsubmit = function (e) {
        const debit = parseFloat(document.querySelector('[name="debit_amount"]').value);
        const credit = parseFloat(document.querySelector('[name="credit_amount"]').value);

        if (debit !== credit) {
            alert('Error: Journal entry must be balanced (Debit must equal Credit)');
            e.preventDefault();
            return false;
        }
    };
</script>
{% endblock %}
