<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | IndustraAccount</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg-body: #f8fafc;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 2rem;
            display: inline-block;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            outline: none;
            font-family: inherit;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .error {
            color: #f43f5e;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo"><i class="fas fa-chart-pie"></i> Industra</div>
        <h2 style="margin-bottom: 0.5rem;">Welcome back</h2>
        <p style="color: #64748b; margin-bottom: 2rem;">Please enter your details to sign in</p>

        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
            <div class="error">Invalid username or password.</div>
            {% endif %}
            <div style="text-align: left;">
                <label style="font-weight: 600; font-size: 0.875rem;">Username</label>
                <input type="text" name="username" required>

                <label style="font-weight: 600; font-size: 0.875rem;">Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>

</html>
